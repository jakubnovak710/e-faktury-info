name: Self-Healing Pipeline

on:
  repository_dispatch:
    types: [self-heal]

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: '20'

jobs:
  analyze-and-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Analyze error with Claude
        id: analyze
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ERROR_MESSAGE: ${{ github.event.client_payload.error_message }}
          SENTRY_URL: ${{ github.event.client_payload.sentry_url }}
          ERROR_URL: ${{ github.event.client_payload.error_url }}
        run: node scripts/self-healing/analyze-error.mjs

      - name: Create fix branch
        if: steps.analyze.outputs.has_fix == 'true'
        run: |
          git config user.name "Self-Healing Bot"
          git config user.email "bot@universal-web.dev"
          BRANCH="fix/self-heal-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Apply fix
        if: steps.analyze.outputs.has_fix == 'true'
        env:
          FIX_PATCH: ${{ steps.analyze.outputs.fix_patch }}
        run: |
          echo "$FIX_PATCH" | git apply --allow-empty
          git add -A
          git commit -m "fix: self-healing — ${{ github.event.client_payload.error_message }}" || true

      - name: Run checks
        if: steps.analyze.outputs.has_fix == 'true'
        run: |
          pnpm build
          # pnpm test (enable when tests exist)

      - name: Push and create PR
        if: steps.analyze.outputs.has_fix == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "$BRANCH"
          gh pr create \
            --title "fix: self-healing — $(echo '${{ github.event.client_payload.error_message }}' | head -c 60)" \
            --body "## Self-Healing Fix

          **Error:** ${{ github.event.client_payload.error_message }}
          **Sentry:** ${{ github.event.client_payload.sentry_url }}

          ### AI Analysis
          ${{ steps.analyze.outputs.analysis }}

          ---
          🤖 Auto-generated by self-healing pipeline" \
            --label "self-healing"

      - name: Notify result
        if: always()
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
        run: |
          STATUS="${{ steps.analyze.outputs.has_fix == 'true' && job.status == 'success' && 'fix-success' || 'fix-failed' }}"
          if [ -n "$SITE_URL" ] && [ -n "$NOTIFY_SECRET" ]; then
            curl -s -X POST "$SITE_URL/api/webhooks/notify" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $NOTIFY_SECRET" \
              -d "{\"type\": \"$STATUS\", \"error\": \"${{ github.event.client_payload.error_message }}\"}"
          fi
