name: Self-Healing Pipeline

on:
  repository_dispatch:
    types: [self-heal]

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: '20'

jobs:
  agent-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Claude Agent SDK
        run: pnpm add -D @anthropic-ai/claude-agent-sdk

      - name: Create fix branch
        run: |
          git config user.name "jakubnovak710"
          git config user.email "jakubnovak710@gmail.com"
          BRANCH="fix/self-heal-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run self-healing agent
        id: agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ERROR_MESSAGE: ${{ github.event.client_payload.error_message }}
          SENTRY_URL: ${{ github.event.client_payload.sentry_url }}
          ERROR_URL: ${{ github.event.client_payload.error_url }}
        run: node scripts/self-healing/agent-fix.mjs

      - name: Check for changes
        id: changes
        if: steps.agent.outputs.has_fix == 'true'
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit fix
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "$(cat <<'EOF'
          fix: self-healing — ${{ github.event.client_payload.error_message }}

          Co-Authored-By: Claude Agent SDK <noreply@anthropic.com>
          EOF
          )"

      - name: Verify fix
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          pnpm build
          pnpm test

      - name: Push and create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git push origin "$BRANCH"
          gh label create "self-healing" --description "Auto-generated by CI self-healing" --color "0E8A16" 2>/dev/null || true
          gh pr create \
            --title "fix: self-healing — $(echo '${{ github.event.client_payload.error_message }}' | head -c 60)" \
            --body "$(cat <<'PREOF'
          ## Self-Healing Fix (Agent SDK)

          **Error:** ${{ github.event.client_payload.error_message }}
          **Sentry:** ${{ github.event.client_payload.sentry_url }}

          ### Agent Analysis
          ${{ steps.agent.outputs.analysis }}

          ### Verification
          - [x] pnpm build passed
          - [x] pnpm test passed

          ---
          Auto-generated by self-healing pipeline (Claude Agent SDK)
          PREOF
          )" \
            --label "self-healing"

      - name: Notify result
        if: always()
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ] && [ "${{ job.status }}" = "success" ]; then
            STATUS="fix-success"
          else
            STATUS="fix-failed"
          fi
          if [ -n "$SITE_URL" ] && [ -n "$NOTIFY_SECRET" ]; then
            curl -s -X POST "$SITE_URL/api/webhooks/notify" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $NOTIFY_SECRET" \
              -d "{\"type\": \"$STATUS\", \"error\": \"${{ github.event.client_payload.error_message }}\"}" || true
          fi
