name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: "https://npm.pkg.github.com"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PAT }}

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Verify design tokens (no hardcoded colors)
        run: node scripts/verify-design-tokens.mjs

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: "https://npm.pkg.github.com"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PAT }}
      - run: pnpm build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: "https://npm.pkg.github.com"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PAT }}
      - run: pnpm test -- --run

  # ────────────────────────────────────────────────────────────────────────
  # Self-heal v2: captures real error logs, retry loop, robust pipeline
  # Runs ONLY on main push when lint/typecheck/build/test fails.
  # Won't trigger on self-healing commits (prevents infinite loops).
  # ────────────────────────────────────────────────────────────────────────
  self-heal:
    name: Self-Heal v2 (Agent SDK)
    permissions:
      contents: write
      pull-requests: write
      packages: read
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build, test]
    if: >-
      !cancelled() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.lint-and-typecheck.result == 'failure' || needs.build.result == 'failure' || needs.test.result == 'failure') &&
      !contains(github.event.head_commit.message, 'self-healing')
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: "https://npm.pkg.github.com"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Install Claude Agent SDK
        run: pnpm add -D @anthropic-ai/claude-agent-sdk

      - name: Determine failure type
        id: failure
        run: |
          ERRORS=""
          if [ "${{ needs.lint-and-typecheck.result }}" = "failure" ]; then
            ERRORS="lint/typecheck"
          fi
          if [ "${{ needs.build.result }}" = "failure" ]; then
            ERRORS="${ERRORS:+$ERRORS, }build"
          fi
          if [ "${{ needs.test.result }}" = "failure" ]; then
            ERRORS="${ERRORS:+$ERRORS, }test"
          fi
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "CI failures detected: $ERRORS"

      - name: Capture error logs
        id: logs
        run: |
          ERROR_LOG_FILE="/tmp/ci-error-log.txt"
          echo "=== Reproducing CI failures to capture error output ===" | tee "$ERROR_LOG_FILE"
          echo "" >> "$ERROR_LOG_FILE"

          # Re-run each failed check and capture output
          if echo "${{ steps.failure.outputs.errors }}" | grep -q "lint"; then
            echo "--- LINT/TYPECHECK OUTPUT ---" >> "$ERROR_LOG_FILE"
            pnpm tsc --noEmit 2>&1 | tail -100 >> "$ERROR_LOG_FILE" || true
            echo "" >> "$ERROR_LOG_FILE"
            pnpm lint 2>&1 | tail -100 >> "$ERROR_LOG_FILE" || true
            echo "" >> "$ERROR_LOG_FILE"
          fi

          if echo "${{ steps.failure.outputs.errors }}" | grep -q "build"; then
            echo "--- BUILD OUTPUT ---" >> "$ERROR_LOG_FILE"
            pnpm build 2>&1 | tail -150 >> "$ERROR_LOG_FILE" || true
            echo "" >> "$ERROR_LOG_FILE"
          fi

          if echo "${{ steps.failure.outputs.errors }}" | grep -q "test"; then
            echo "--- TEST OUTPUT ---" >> "$ERROR_LOG_FILE"
            pnpm test -- --run 2>&1 | tail -100 >> "$ERROR_LOG_FILE" || true
            echo "" >> "$ERROR_LOG_FILE"
          fi

          echo "error_log_file=$ERROR_LOG_FILE" >> $GITHUB_OUTPUT
          echo "Captured $(wc -l < "$ERROR_LOG_FILE") lines of error output"

      - name: Create fix branch
        run: |
          git config user.name "jakubnovak710"
          git config user.email "jakubnovak710@gmail.com"
          BRANCH="fix/ci-self-heal-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run self-healing agent
        id: agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ERROR_TYPE: ${{ steps.failure.outputs.errors }}
          ERROR_LOG_FILE: ${{ steps.logs.outputs.error_log_file }}
        run: node scripts/self-healing/agent-fix.mjs

      - name: Check for changes
        id: changes
        if: steps.agent.outputs.has_fix == 'true'
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No file changes detected despite agent reporting fix"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Commit fix
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "$(cat <<'EOF'
          fix(ci): self-healing — ${{ steps.failure.outputs.errors }}

          Auto-fixed by self-healing pipeline v2 (attempt ${{ steps.agent.outputs.attempt || '1' }}).

          Co-Authored-By: Claude Agent SDK <noreply@anthropic.com>
          EOF
          )"

      - name: Push and create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git push origin "$BRANCH"
          gh label create "self-healing" --description "Auto-generated by CI self-healing" --color "0E8A16" 2>/dev/null || true
          gh pr create \
            --title "fix(ci): self-healing — ${{ steps.failure.outputs.errors }}" \
            --body "$(cat <<'PREOF'
          ## CI Self-Healing Fix (v2)

          **Failed jobs:** ${{ steps.failure.outputs.errors }}
          **Commit:** ${{ github.sha }}
          **Fix attempt:** ${{ steps.agent.outputs.attempt || '1' }}/2

          ### Agent Analysis
          ${{ steps.agent.outputs.analysis }}

          ### Verification
          - [x] Agent ran internal verify loop
          - [x] Independent verification passed before commit

          ### What's different in v2
          - Agent received **full error logs** (not just "build failure")
          - Agent had **retry with feedback** (up to 2 attempts)
          - Independent verification ran **inside agent process**

          ---
          Auto-generated by CI self-healing pipeline v2 (Claude Agent SDK)
          PREOF
          )" \
            --label "self-healing"

      - name: Notify admin (email via SMTP)
        if: always()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ] && [ "${{ job.status }}" = "success" ]; then
            STATUS="fix-success"
            SUBJECT="[Universal Web] CI Self-Heal SUCCESS"
            BODY="CI self-healing pipeline v2 fixed: ${{ steps.failure.outputs.errors }}\n\nAttempt: ${{ steps.agent.outputs.attempt || '1' }}/2\nCommit: ${{ github.sha }}\nBranch: $BRANCH\n\nA PR has been created for review."
          else
            STATUS="fix-failed"
            SUBJECT="[Universal Web] CI Self-Heal FAILED"
            BODY="CI self-healing pipeline v2 could not fix: ${{ steps.failure.outputs.errors }}\n\nCommit: ${{ github.sha }}\nAgent output: ${{ steps.agent.outputs.analysis }}\n\nManual intervention required."
          fi
          if [ -n "$SMTP_HOST" ] && [ -n "$ADMIN_EMAIL" ]; then
            node -e "
              const nodemailer = require('nodemailer');
              const transport = nodemailer.createTransport({
                host: process.env.SMTP_HOST,
                port: Number(process.env.SMTP_PORT || 465),
                secure: process.env.SMTP_SECURE === 'true',
                auth: { user: process.env.SMTP_USER, pass: process.env.SMTP_PASS }
              });
              transport.sendMail({
                from: (process.env.EMAIL_FROM_NAME || 'Universal Web Bot') + ' <' + process.env.EMAIL_FROM + '>',
                to: process.env.ADMIN_EMAIL,
                subject: '$SUBJECT',
                text: '$BODY'.replace(/\\\\n/g, '\n')
              }).then(() => console.log('Email sent')).catch(e => console.error('Email failed:', e.message));
            " || true
          fi
