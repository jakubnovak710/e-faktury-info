name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Verify design tokens (no hardcoded colors)
        run: node scripts/verify-design-tokens.mjs

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test -- --run

  # ────────────────────────────────────────────────────────────────────────
  # Self-heal: runs ONLY on main push when lint/typecheck/build/test fails
  # Max 1 attempt per commit. Won't trigger on self-healing PRs.
  # ────────────────────────────────────────────────────────────────────────
  self-heal:
    name: Self-Heal (Agent SDK)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build, test]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.lint-and-typecheck.result == 'failure' || needs.build.result == 'failure' || needs.test.result == 'failure') &&
      !contains(github.event.head_commit.message, 'self-healing')
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Claude Agent SDK
        run: pnpm add -D @anthropic-ai/claude-agent-sdk

      - name: Determine failure type
        id: failure
        run: |
          ERRORS=""
          if [ "${{ needs.lint-and-typecheck.result }}" = "failure" ]; then
            ERRORS="lint/typecheck failure"
          fi
          if [ "${{ needs.build.result }}" = "failure" ]; then
            ERRORS="${ERRORS:+$ERRORS, }build failure"
          fi
          if [ "${{ needs.test.result }}" = "failure" ]; then
            ERRORS="${ERRORS:+$ERRORS, }test failure"
          fi
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "CI failures detected: $ERRORS"

      - name: Create fix branch
        run: |
          git config user.name "Self-Healing Bot"
          git config user.email "bot@universal-web.dev"
          BRANCH="fix/ci-self-heal-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run self-healing agent
        id: agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ERROR_MESSAGE: "CI failed on main: ${{ steps.failure.outputs.errors }}. Commit: ${{ github.sha }}"
        run: node scripts/self-healing/agent-fix.mjs

      - name: Check for changes
        id: changes
        if: steps.agent.outputs.has_fix == 'true'
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit fix
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "$(cat <<'EOF'
          fix(ci): self-healing — ${{ steps.failure.outputs.errors }}

          Co-Authored-By: Claude Agent SDK <noreply@anthropic.com>
          EOF
          )"

      - name: Verify fix
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          pnpm lint
          pnpm tsc --noEmit
          pnpm build
          pnpm test -- --run

      - name: Push and create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "$BRANCH"
          gh pr create \
            --title "fix(ci): self-healing — ${{ steps.failure.outputs.errors }}" \
            --body "## CI Self-Healing Fix

          **Failed jobs:** ${{ steps.failure.outputs.errors }}
          **Commit:** ${{ github.sha }}

          ### Agent Analysis
          ${{ steps.agent.outputs.analysis }}

          ### Verification
          - [x] \`pnpm lint\` passed
          - [x] \`pnpm tsc --noEmit\` passed
          - [x] \`pnpm build\` passed
          - [x] \`pnpm test\` passed

          ---
          Auto-generated by CI self-healing pipeline (Claude Agent SDK)" \
            --label "self-healing"

      - name: Notify admin (email via site webhook)
        if: always()
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ] && [ "${{ job.status }}" = "success" ]; then
            STATUS="fix-success"
          else
            STATUS="fix-failed"
          fi
          if [ -n "$SITE_URL" ] && [ -n "$NOTIFY_SECRET" ]; then
            curl -s -X POST "$SITE_URL/api/webhooks/notify" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $NOTIFY_SECRET" \
              -d "{\"type\": \"ci-$STATUS\", \"error\": \"${{ steps.failure.outputs.errors }}\"}" || true
          fi

