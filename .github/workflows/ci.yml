name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Verify design tokens (no hardcoded colors)
        run: node scripts/verify-design-tokens.mjs

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test -- --run

  # ────────────────────────────────────────────────────────────────────────
  # Self-heal: runs ONLY on main push when lint/typecheck/build/test fails
  # Max 1 attempt per commit. Won't trigger on self-healing PRs.
  # ────────────────────────────────────────────────────────────────────────
  self-heal:
    name: Self-Heal (Agent SDK)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build, test]
    if: >-
      !cancelled() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.lint-and-typecheck.result == 'failure' || needs.build.result == 'failure' || needs.test.result == 'failure') &&
      !contains(github.event.head_commit.message, 'self-healing')
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Claude Agent SDK
        run: pnpm add -D @anthropic-ai/claude-agent-sdk

      - name: Determine failure type
        id: failure
        run: |
          ERRORS=""
          if [ "${{ needs.lint-and-typecheck.result }}" = "failure" ]; then
            ERRORS="lint/typecheck failure"
          fi
          if [ "${{ needs.build.result }}" = "failure" ]; then
            ERRORS="${ERRORS:+$ERRORS, }build failure"
          fi
          if [ "${{ needs.test.result }}" = "failure" ]; then
            ERRORS="${ERRORS:+$ERRORS, }test failure"
          fi
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "CI failures detected: $ERRORS"

      - name: Create fix branch
        run: |
          git config user.name "jakubnovak710"
          git config user.email "jakubnovak710@gmail.com"
          BRANCH="fix/ci-self-heal-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run self-healing agent
        id: agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ERROR_MESSAGE: "CI failed on main: ${{ steps.failure.outputs.errors }}. Commit: ${{ github.sha }}"
        run: node scripts/self-healing/agent-fix.mjs

      - name: Check for changes
        id: changes
        if: steps.agent.outputs.has_fix == 'true'
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit fix
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "$(cat <<'EOF'
          fix(ci): self-healing — ${{ steps.failure.outputs.errors }}

          Co-Authored-By: Claude Agent SDK <noreply@anthropic.com>
          EOF
          )"

      - name: Verify fix
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          pnpm lint
          pnpm tsc --noEmit
          pnpm build
          pnpm test -- --run

      - name: Push and create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "$BRANCH"
          gh label create "self-healing" --description "Auto-generated by CI self-healing" --color "0E8A16" 2>/dev/null || true
          gh pr create \
            --title "fix(ci): self-healing — ${{ steps.failure.outputs.errors }}" \
            --body "$(cat <<'PREOF'
          ## CI Self-Healing Fix

          **Failed jobs:** ${{ steps.failure.outputs.errors }}
          **Commit:** ${{ github.sha }}

          ### Agent Analysis
          ${{ steps.agent.outputs.analysis }}

          ### Verification
          - [x] pnpm lint passed
          - [x] pnpm tsc --noEmit passed
          - [x] pnpm build passed
          - [x] pnpm test passed

          ---
          Auto-generated by CI self-healing pipeline (Claude Agent SDK)
          PREOF
          )" \
            --label "self-healing"

      - name: Notify admin (email via SMTP)
        if: always()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ] && [ "${{ job.status }}" = "success" ]; then
            STATUS="fix-success"
            SUBJECT="[Universal Web] CI Self-Heal SUCCESS"
            BODY="CI self-healing pipeline successfully fixed: ${{ steps.failure.outputs.errors }}\n\nCommit: ${{ github.sha }}\nBranch: $BRANCH\n\nA PR has been created for review."
          else
            STATUS="fix-failed"
            SUBJECT="[Universal Web] CI Self-Heal FAILED"
            BODY="CI self-healing pipeline could not fix: ${{ steps.failure.outputs.errors }}\n\nCommit: ${{ github.sha }}\n\nManual intervention required."
          fi
          if [ -n "$SMTP_HOST" ] && [ -n "$ADMIN_EMAIL" ]; then
            node -e "
              const nodemailer = require('nodemailer');
              const transport = nodemailer.createTransport({
                host: process.env.SMTP_HOST,
                port: Number(process.env.SMTP_PORT || 465),
                secure: process.env.SMTP_SECURE === 'true',
                auth: { user: process.env.SMTP_USER, pass: process.env.SMTP_PASS }
              });
              transport.sendMail({
                from: (process.env.EMAIL_FROM_NAME || 'Universal Web Bot') + ' <' + process.env.EMAIL_FROM + '>',
                to: process.env.ADMIN_EMAIL,
                subject: '$SUBJECT',
                text: '$BODY'.replace(/\\\\n/g, '\n')
              }).then(() => console.log('Email sent')).catch(e => console.error('Email failed:', e.message));
            " || true
          fi

